# ─────────────────────────────────────────────
#  Configuración del microservicio Security
# ─────────────────────────────────────────────

security {

  http {
    port = 8082
    port = ${?HTTP_PORT}
  }

  kafka {
    bootstrap-servers    = "localhost:9092"
    bootstrap-servers    = ${?KAFKA_BOOTSTRAP}
    topic-in             = "registro.pasajero"
    topic-in             = ${?KAFKA_TOPIC_IN}
    topic-out            = "equipaje.bodega"
    topic-out            = ${?KAFKA_TOPIC_OUT}
    topic-eventualidades = "vuelo.eventualidades"
    topic-eventualidades = ${?KAFKA_TOPIC_EVENTUALIDADES}
    group-id             = "security-group-v2"
    group-id             = ${?KAFKA_GROUP_ID}
    acks                 = "all"
  }

  db {
    url      = "jdbc:postgresql://localhost:5434/security_db"
    url      = ${?DB_URL}
    user     = "security"
    user     = ${?DB_USER}
    password = "security123"
    password = ${?DB_PASSWORD}
    driver   = "org.postgresql.Driver"
    pool-size = 10
    pool-size = ${?DB_POOL_SIZE}
  }

  inspeccion {
    peso-maximo-kg       = 23.0
    tiempo-inspeccion-ms = 500
  }
}

# ─── Play config (nivel raíz) ─────────────────
play.modules.enabled += "Module"
play.application.loader = "play.api.inject.guice.GuiceApplicationLoader"